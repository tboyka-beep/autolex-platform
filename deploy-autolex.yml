name: Build and Deploy Autolex Plugin

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create plugin ZIP
        run: |
          cd plugin
          zip -r ../autolex-platform.zip autolex-platform             -x "*/.git/*"             -x "*/node_modules/*"             -x "*/.DS_Store"

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: autolex-platform
          path: autolex-platform.zip

      - name: Deploy plugin via SFTP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USER }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          port: ${{ secrets.CPANEL_PORT }}
          source: "plugin/autolex-platform/*"
          target: "${{ secrets.WP_PLUGIN_PATH }}"
          strip_components: 2
          overwrite: true
