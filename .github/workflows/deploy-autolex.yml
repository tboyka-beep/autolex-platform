name: Validate and Deploy Autolex Plugin

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-build:
    name: Validate and build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Validate PHP syntax
        run: find plugin/autolex-platform -type f -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Test EEA field normalization
        run: php tests/eea-importer-smoke.php

      - name: Create plugin ZIP
        run: |
          cd plugin
          zip -rq ../autolex-platform.zip autolex-platform \
            -x '*/.git/*' \
            -x '*/node_modules/*' \
            -x '*/vendor/*' \
            -x '*/.DS_Store'

      - name: Upload plugin ZIP
        uses: actions/upload-artifact@v4
        with:
          name: autolex-platform-${{ github.sha }}
          path: autolex-platform.zip
          if-no-files-found: error
          retention-days: 30

  deploy-production:
    name: Deploy to cPanel
    if: >-
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: validate-build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: autolex-production
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check deployment configuration
        env:
          CPANEL_API_HOST: ${{ secrets.CPANEL_API_HOST }}
          CPANEL_API_USER: ${{ secrets.CPANEL_API_USER }}
          CPANEL_API_TOKEN: ${{ secrets.CPANEL_API_TOKEN }}
          CPANEL_PLUGIN_DIR: ${{ secrets.CPANEL_PLUGIN_DIR }}
        run: |
          test -n "$CPANEL_API_HOST" || { echo 'Missing CPANEL_API_HOST secret'; exit 1; }
          test -n "$CPANEL_API_USER" || { echo 'Missing CPANEL_API_USER secret'; exit 1; }
          test -n "$CPANEL_API_TOKEN" || { echo 'Missing CPANEL_API_TOKEN secret'; exit 1; }
          test -n "$CPANEL_PLUGIN_DIR" || { echo 'Missing CPANEL_PLUGIN_DIR secret'; exit 1; }
          case "$CPANEL_API_HOST" in
            *://*|*/*|*:*) echo 'CPANEL_API_HOST must be a hostname without a protocol, port, or path'; exit 1 ;;
          esac
          case "$CPANEL_API_USER" in
            *[!A-Za-z0-9._-]*) echo 'CPANEL_API_USER contains unsupported characters'; exit 1 ;;
          esac
          case "$CPANEL_PLUGIN_DIR" in
            /*|*..*|*[^A-Za-z0-9._/-]*) echo 'CPANEL_PLUGIN_DIR must be a safe path relative to the cPanel home directory'; exit 1 ;;
          esac
          case "$CPANEL_PLUGIN_DIR" in
            */wp-content/plugins/autolex-platform) ;;
            *) echo 'CPANEL_PLUGIN_DIR must end with /wp-content/plugins/autolex-platform'; exit 1 ;;
          esac

      - name: Deploy plugin through the cPanel API
        env:
          CPANEL_API_HOST: ${{ secrets.CPANEL_API_HOST }}
          CPANEL_API_USER: ${{ secrets.CPANEL_API_USER }}
          CPANEL_API_TOKEN: ${{ secrets.CPANEL_API_TOKEN }}
          CPANEL_PLUGIN_DIR: ${{ secrets.CPANEL_PLUGIN_DIR }}
        run: |
          set -euo pipefail

          api_base="https://${CPANEL_API_HOST}:2083"
          auth_header="Authorization: cpanel ${CPANEL_API_USER}:${CPANEL_API_TOKEN}"
          local_root='plugin/autolex-platform'
          entry_file="${local_root}/autolex-platform.php"

          while IFS= read -r -d '' local_dir; do
            relative_dir="${local_dir#${local_root}/}"
            parent_dir="$(dirname "$relative_dir")"
            directory_name="$(basename "$relative_dir")"
            remote_parent="$CPANEL_PLUGIN_DIR"
            if [ "$parent_dir" != '.' ]; then
              remote_parent="${remote_parent}/${parent_dir}"
            fi

            curl --silent --show-error --fail-with-body --get \
              --header "$auth_header" \
              --data-urlencode "cpanel_jsonapi_user=${CPANEL_API_USER}" \
              --data-urlencode 'cpanel_jsonapi_apiversion=2' \
              --data-urlencode 'cpanel_jsonapi_module=Fileman' \
              --data-urlencode 'cpanel_jsonapi_func=mkdir' \
              --data-urlencode "path=${remote_parent}" \
              --data-urlencode "name=${directory_name}" \
              --data-urlencode 'permissions=0755' \
              "${api_base}/json-api/cpanel" >/dev/null || true
          done < <(find "$local_root" -mindepth 1 -type d -print0)

          upload_file() {
            local local_file="$1"
            local relative_file remote_dir response
            relative_file="${local_file#${local_root}/}"
            remote_dir="$CPANEL_PLUGIN_DIR"
            if [ "$(dirname "$relative_file")" != '.' ]; then
              remote_dir="${remote_dir}/$(dirname "$relative_file")"
            fi

            response="$(curl --silent --show-error --fail-with-body \
              --header "$auth_header" \
              --form "dir=${remote_dir}" \
              --form 'overwrite=1' \
              --form "file-1=@${local_file};filename=$(basename "$local_file")" \
              "${api_base}/execute/Fileman/upload_files")"

            if ! jq -e '.status == 1' <<<"$response" >/dev/null; then
              echo "cPanel rejected upload of ${relative_file}"
              jq -r '.errors[]? // .messages[]? // "Unknown cPanel API error"' <<<"$response"
              return 1
            fi
          }

          while IFS= read -r -d '' local_file; do
            upload_file "$local_file"
          done < <(find "$local_root" -type f ! -path "$entry_file" -print0)

          upload_file "$entry_file"
          echo 'cPanel API deployment completed.'

      - name: Verify live Autolex endpoint
        run: |
          set -euo pipefail

          expected_version="$(sed -n "s/define('AUTOLEX_PLATFORM_VERSION', '\([^']*\)');/\1/p" plugin/autolex-platform/autolex-platform.php)"
          response="$(curl --silent --show-error --fail \
            --retry 4 \
            --retry-delay 3 \
            --retry-all-errors \
            'https://autolex.hu/wp-json/autolex/v1/status')"

          jq -e \
            --arg expected_version "$expected_version" \
            '.service == "autolex-platform" and .status == "ok" and .version == $expected_version' \
            <<<"$response" >/dev/null

          echo "Autolex ${expected_version} is live."
