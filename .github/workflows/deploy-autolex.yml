name: Validate and Deploy Autolex Plugin

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-build:
    name: Validate and build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Validate PHP syntax
        run: find plugin/autolex-platform -type f -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Create plugin ZIP
        run: |
          cd plugin
          zip -rq ../autolex-platform.zip autolex-platform \
            -x '*/.git/*' \
            -x '*/node_modules/*' \
            -x '*/vendor/*' \
            -x '*/.DS_Store'

      - name: Upload plugin ZIP
        uses: actions/upload-artifact@v4
        with:
          name: autolex-platform-${{ github.sha }}
          path: autolex-platform.zip
          if-no-files-found: error
          retention-days: 30

  deploy-production:
    name: Deploy to cPanel
    if: >-
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: validate-build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: autolex-production
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check deployment configuration
        env:
          CPANEL_FTP_HOST: ${{ secrets.CPANEL_FTP_HOST }}
          CPANEL_FTP_USER: ${{ secrets.CPANEL_FTP_USER }}
          CPANEL_FTP_PASSWORD: ${{ secrets.CPANEL_FTP_PASSWORD }}
          CPANEL_FTP_PORT: ${{ secrets.CPANEL_FTP_PORT }}
        run: |
          test -n "$CPANEL_FTP_HOST" || { echo 'Missing CPANEL_FTP_HOST secret'; exit 1; }
          test -n "$CPANEL_FTP_USER" || { echo 'Missing CPANEL_FTP_USER secret'; exit 1; }
          test -n "$CPANEL_FTP_PASSWORD" || { echo 'Missing CPANEL_FTP_PASSWORD secret'; exit 1; }
          test -n "$CPANEL_FTP_PORT" || { echo 'Missing CPANEL_FTP_PORT secret'; exit 1; }
          case "$CPANEL_FTP_PORT" in
            *[!0-9]*) echo 'CPANEL_FTP_PORT must be numeric'; exit 1 ;;
          esac
          case "$CPANEL_FTP_HOST" in
            *://*|*/*) echo 'CPANEL_FTP_HOST must be a hostname without a protocol or path'; exit 1 ;;
          esac

      - name: Deploy plugin via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.CPANEL_FTP_HOST }}
          username: ${{ secrets.CPANEL_FTP_USER }}
          password: ${{ secrets.CPANEL_FTP_PASSWORD }}
          port: ${{ secrets.CPANEL_FTP_PORT }}
          protocol: ftps
          local-dir: ./plugin/autolex-platform/
          server-dir: ./
          state-name: .autolex-ftps-sync-state.json
          dangerous-clean-slate: false
          log-level: minimal
          security: strict
          timeout: 60000
